<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraPrima Admin | Gestão Directa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-slate-900 text-white p-6 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1>TerraPrima</h1>
                <p>Painel</p>
            </div>
           <a href="https://docs.google.com/spreadsheets/d/1vC3z76S8e9N9_HkS7UoM-p0pL0H7L6D0_k7_k7_k7/edit" target="_blank" ...>
    ✎ Abrir Google Sheets
</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div id="status-container" class="mb-8 p-4 rounded-lg bg-white border border-slate-200 flex items-center gap-4">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-gray-400 animate-pulse"></div>
            <span id="status-text" class="text-sm text-slate-500">A verificar ligação ao Google Sheets...</span>
        </div>

        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 opacity-0 transition-opacity duration-500">
            </div>
    </main>

    <script>
        // 1. COLOQUE O SEU LINK CSV AQUI
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMJLh55N7yiksusMxcYd7XpWTo1GE6y0FpSPiqLLBrzodkh2AGLen7aHl8D2RmEj239c7mjvvNS6UW/pub?output=csv';

        function initAdmin() {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (!SHEET_CSV_URL.includes('output=csv')) {
                showError("O link configurado não parece ser um link CSV válido.");
                return;
            }

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data.length > 0) {
                        statusDot.classList.replace('bg-gray-400', 'bg-green-500');
                        statusDot.classList.remove('animate-pulse');
                        statusText.innerText = `Sincronizado: ${results.data.length} propriedades encontradas.`;
                        renderGrid(results.data);
                    } else {
                        showError("A folha de cálculo parece estar vazia.");
                    }
                },
                error: function(err) {
                    showError("Erro na ligação: Verifique se publicou a folha na Web.");
                    console.error(err);
                }
            });
        }

function renderGrid(data) {
    const grid = document.getElementById('propertyGrid');
    grid.innerHTML = data.map(p => {
        const hasGallery = p.gallery_ids && p.gallery_ids.length > 10;
        const hasVideo = p.youtube_id && p.youtube_id.length > 5;
        
        return `
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-2xl transition-all group">
            <div class="relative h-48 overflow-hidden">
                <img src="${p.image_capa || p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" onerror="this.src='https://placehold.co/600x400?text=Sem+Foto+Capa'">
                <div class="absolute top-3 right-3 flex gap-2">
                    ${hasGallery ? '<span class="bg-green-500 text-white p-1 rounded-md text-[8px] uppercase">Galeria OK</span>' : '<span class="bg-amber-500 text-white p-1 rounded-md text-[8px] uppercase">Sem Galeria</span>'}
                    ${hasVideo ? '<span class="bg-red-600 text-white p-1 rounded-md text-[8px] uppercase">Video OK</span>' : ''}
                </div>
            </div>
            <div class="p-5">
                <h2 class="text-lg text-slate-800 truncate">${p.title || 'Sem Título'}</h2>
                <p class="text-slate-400 text-xs mb-3">📍 ${p.location}</p>
                
                <div class="space-y-2 border-t pt-3">
                    <div class="flex justify-between">
                        <span class="text-slate-400 uppercase">Preço</span>
                        <span class="text-slate-900">${p.price}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-slate-400 uppercase">ID Interno</span>
                    <span class="text-slate-500">${p.id}</span>
                </div>
            </div>

                <div class="mt-4 flex gap-2">
                    <a <a href="https://imoaldeias.github.io/imoaldeias/#property-${p.id}" 
            target="_blank" 
            class="flex-1 text-center bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-xl uppercase transition">
            Ver no Site
        </a>
                </div>
            </div>
        </div>
    `}).join('');
    grid.classList.remove('opacity-0');
}

        function showError(msg) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            statusDot.classList.replace('bg-gray-400', 'bg-red-500');
            statusDot.classList.remove('animate-pulse');
            statusText.innerText = msg;
            statusText.classList.add('text-red-600');
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
